<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIERUBA Index｜共通認識力 自己診断</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --navy: #0f1740;
    --navy-mid: #1a2560;
    --blue: #2b4acb;
    --blue-light: #4a6ef5;
    --amber: #f59e0b;
    --amber-light: #fbbf24;
    --gray-bg: #f4f6fb;
    --gray-card: #ffffff;
    --gray-border: #e2e8f0;
    --text-primary: #0f1740;
    --text-secondary: #64748b;
    --text-light: #94a3b8;
    --cat1: #3b82f6;
    --cat2: #8b5cf6;
    --cat3: #10b981;
    --cat4: #f59e0b;
    --cat5: #ef4444;
    --cat6: #ec4899;
    --radius: 16px;
    --shadow: 0 4px 24px rgba(15,23,64,0.10);
    --shadow-lg: 0 8px 40px rgba(15,23,64,0.16);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', 'Noto Sans JP', sans-serif;
    background: var(--gray-bg);
    color: var(--text-primary);
    min-height: 100vh;
    line-height: 1.6;
  }

  /* ─── Header ─── */
  .site-header {
    background: var(--navy);
    padding: 0 24px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    font-size: 18px;
    font-weight: 800;
    color: #fff;
    letter-spacing: 0.04em;
  }
  .logo span { color: var(--amber); }

  /* ─── Progress Bar ─── */
  .progress-wrap {
    background: var(--navy-mid);
    padding: 10px 24px;
    position: sticky;
    top: 56px;
    z-index: 99;
    display: none;
  }
  .progress-wrap.visible { display: block; }
  .progress-label {
    font-size: 11px;
    color: rgba(255,255,255,0.6);
    margin-bottom: 6px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .progress-bar-bg {
    background: rgba(255,255,255,0.15);
    border-radius: 99px;
    height: 6px;
    overflow: hidden;
  }
  .progress-bar-fill {
    background: linear-gradient(90deg, var(--amber), var(--amber-light));
    height: 100%;
    border-radius: 99px;
    transition: width 0.4s ease;
  }
  .progress-steps {
    display: flex;
    gap: 6px;
    margin-top: 8px;
  }
  .progress-step {
    font-size: 10px;
    color: rgba(255,255,255,0.4);
    flex: 1;
    text-align: center;
    transition: color 0.3s;
  }
  .progress-step.done { color: var(--amber-light); }
  .progress-step.active { color: #fff; font-weight: 700; }

  /* ─── Main Container ─── */
  .container {
    max-width: 680px;
    margin: 0 auto;
    padding: 32px 16px 80px;
  }

  /* ─── Screens ─── */
  .screen { display: none; }
  .screen.active { display: block; }

  /* ─── Intro Screen ─── */
  .intro-hero {
    text-align: center;
    padding: 48px 24px 40px;
    background: linear-gradient(160deg, var(--navy) 0%, var(--navy-mid) 100%);
    border-radius: var(--radius);
    color: #fff;
    margin-bottom: 24px;
    box-shadow: var(--shadow-lg);
    position: relative;
    overflow: hidden;
  }
  .intro-hero::before {
    content: '';
    position: absolute;
    top: -60px; right: -60px;
    width: 240px; height: 240px;
    background: radial-gradient(circle, rgba(245,158,11,0.2) 0%, transparent 70%);
    border-radius: 50%;
  }
  .intro-badge {
    display: inline-block;
    background: rgba(245,158,11,0.2);
    border: 1px solid rgba(245,158,11,0.4);
    color: var(--amber-light);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    padding: 4px 14px;
    border-radius: 99px;
    margin-bottom: 20px;
    text-transform: uppercase;
  }
  .intro-hero h1 {
    font-size: 32px;
    font-weight: 900;
    line-height: 1.2;
    margin-bottom: 8px;
  }
  .intro-hero h1 span { color: var(--amber); }
  .intro-hero p {
    font-size: 14px;
    color: rgba(255,255,255,0.7);
    margin-top: 12px;
  }
  .intro-score-preview {
    display: inline-flex;
    align-items: baseline;
    gap: 4px;
    background: rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 10px 24px;
    margin-top: 24px;
  }
  .intro-score-preview .big { font-size: 36px; font-weight: 900; color: var(--amber); }
  .intro-score-preview .small { font-size: 16px; color: rgba(255,255,255,0.5); }

  .intro-cards {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
    margin-bottom: 28px;
  }
  @media (max-width: 480px) { .intro-cards { grid-template-columns: 1fr; } }
  .intro-card {
    background: #fff;
    border-radius: var(--radius);
    padding: 20px 16px;
    box-shadow: var(--shadow);
    text-align: center;
  }
  .intro-card-icon { font-size: 28px; margin-bottom: 10px; }
  .intro-card-title { font-size: 13px; font-weight: 700; margin-bottom: 4px; }
  .intro-card-desc { font-size: 11px; color: var(--text-secondary); }

  .intro-info {
    background: #fff;
    border-radius: var(--radius);
    padding: 24px;
    box-shadow: var(--shadow);
    margin-bottom: 28px;
  }
  .intro-info h3 { font-size: 14px; font-weight: 700; margin-bottom: 12px; }
  .intro-info ul { list-style: none; display: flex; flex-direction: column; gap: 8px; }
  .intro-info li {
    font-size: 13px;
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .intro-info li::before {
    content: '✓';
    color: var(--blue);
    font-weight: 700;
    flex-shrink: 0;
  }

  /* ─── Buttons ─── */
  .btn-primary {
    display: block;
    width: 100%;
    background: linear-gradient(135deg, var(--blue) 0%, var(--blue-light) 100%);
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 16px 32px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: all 0.2s;
    box-shadow: 0 4px 16px rgba(43,74,203,0.4);
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(43,74,203,0.5); }
  .btn-primary:active { transform: translateY(0); }
  .btn-primary:disabled {
    background: var(--gray-border);
    color: var(--text-light);
    box-shadow: none;
    cursor: not-allowed;
    transform: none;
  }

  .btn-secondary {
    background: #fff;
    color: var(--text-secondary);
    border: 1px solid var(--gray-border);
    border-radius: 12px;
    padding: 14px 28px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-secondary:hover { background: var(--gray-bg); }

  .btn-row { display: flex; gap: 12px; margin-top: 24px; }
  .btn-row .btn-secondary { flex: 0 0 auto; }
  .btn-row .btn-primary { flex: 1; }

  /* ─── Question Screen ─── */
  .q-header {
    background: #fff;
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 16px;
    box-shadow: var(--shadow);
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .q-cat-icon {
    width: 52px; height: 52px;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    flex-shrink: 0;
  }
  .q-cat-meta { flex: 1; }
  .q-cat-badge {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .q-cat-name { font-size: 20px; font-weight: 800; }
  .q-cat-desc { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }

  .scale-labels {
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    color: var(--text-light);
    padding: 0 4px;
    margin-bottom: 4px;
  }

  .q-card {
    background: #fff;
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 12px;
    box-shadow: var(--shadow);
  }
  .q-text {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 14px;
    line-height: 1.5;
  }
  .q-text::before {
    content: '私は、';
    color: var(--text-light);
    font-weight: 400;
  }
  .scale-buttons {
    display: flex;
    gap: 8px;
  }
  .scale-btn {
    flex: 1;
    aspect-ratio: 1;
    border: 2px solid var(--gray-border);
    border-radius: 10px;
    background: #fff;
    font-size: 16px;
    font-weight: 700;
    color: var(--text-light);
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    max-height: 52px;
  }
  .scale-btn:hover {
    border-color: var(--blue-light);
    color: var(--blue-light);
    background: rgba(74,110,245,0.05);
  }
  .scale-btn.selected {
    border-color: var(--active-color, var(--blue));
    background: var(--active-color, var(--blue));
    color: #fff;
    box-shadow: 0 2px 8px rgba(43,74,203,0.3);
    transform: scale(1.05);
  }

  /* ─── Results Screen ─── */
  .result-hero {
    background: linear-gradient(160deg, var(--navy) 0%, var(--navy-mid) 100%);
    border-radius: var(--radius);
    padding: 36px 28px;
    text-align: center;
    color: #fff;
    margin-bottom: 20px;
    box-shadow: var(--shadow-lg);
    position: relative;
    overflow: hidden;
  }
  .result-hero::before {
    content: '';
    position: absolute;
    bottom: -80px; left: -80px;
    width: 300px; height: 300px;
    background: radial-gradient(circle, rgba(245,158,11,0.15) 0%, transparent 70%);
    border-radius: 50%;
  }
  .result-title-label {
    font-size: 11px;
    letter-spacing: 0.14em;
    color: var(--amber-light);
    margin-bottom: 8px;
    text-transform: uppercase;
    font-weight: 700;
  }
  .result-mi-label {
    font-size: 13px;
    color: rgba(255,255,255,0.6);
    margin-bottom: 4px;
  }
  .result-score-big {
    font-size: 64px;
    font-weight: 900;
    color: var(--amber);
    line-height: 1;
    letter-spacing: -0.02em;
  }
  .result-score-denom {
    font-size: 22px;
    color: rgba(255,255,255,0.4);
    font-weight: 400;
  }
  .result-stars {
    font-size: 24px;
    margin: 12px 0 4px;
    letter-spacing: 2px;
  }
  .result-rank {
    display: inline-block;
    background: rgba(245,158,11,0.2);
    border: 1px solid rgba(245,158,11,0.4);
    color: var(--amber-light);
    font-size: 12px;
    font-weight: 700;
    padding: 4px 16px;
    border-radius: 99px;
    margin-top: 8px;
    letter-spacing: 0.08em;
  }

  .section-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--text-secondary);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin: 28px 0 12px;
    padding-left: 4px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title::before {
    content: '';
    display: inline-block;
    width: 3px; height: 14px;
    background: var(--blue);
    border-radius: 2px;
  }

  .chart-card {
    background: #fff;
    border-radius: var(--radius);
    padding: 28px 20px;
    box-shadow: var(--shadow);
    margin-bottom: 20px;
  }
  .chart-wrap {
    max-width: 320px;
    margin: 0 auto;
  }

  .scores-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 20px;
  }
  @media (max-width: 360px) { .scores-grid { grid-template-columns: 1fr; } }
  .score-item {
    background: #fff;
    border-radius: 12px;
    padding: 16px;
    box-shadow: var(--shadow);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .score-item-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .score-item-name { font-size: 12px; color: var(--text-secondary); margin-bottom: 2px; }
  .score-item-val { font-size: 20px; font-weight: 800; }
  .score-item-bar-bg {
    height: 4px;
    background: var(--gray-bg);
    border-radius: 99px;
    margin-top: 6px;
    overflow: hidden;
  }
  .score-item-bar { height: 100%; border-radius: 99px; transition: width 0.8s ease; }
  .score-item-inner { flex: 1; min-width: 0; }

  .type-card {
    background: linear-gradient(135deg, var(--navy) 0%, #1e2f7a 100%);
    border-radius: var(--radius);
    padding: 28px;
    margin-bottom: 20px;
    color: #fff;
    box-shadow: var(--shadow-lg);
  }
  .type-label {
    font-size: 11px;
    color: var(--amber-light);
    letter-spacing: 0.1em;
    font-weight: 700;
    margin-bottom: 10px;
    text-transform: uppercase;
  }
  .type-name {
    font-size: 28px;
    font-weight: 900;
    margin-bottom: 14px;
    line-height: 1.2;
  }
  .type-name span { color: var(--amber); }
  .type-desc {
    font-size: 14px;
    color: rgba(255,255,255,0.8);
    line-height: 1.7;
    margin-bottom: 20px;
  }
  .type-tags { display: flex; flex-wrap: wrap; gap: 8px; }
  .type-tag {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    color: rgba(255,255,255,0.9);
    font-size: 12px;
    padding: 4px 12px;
    border-radius: 99px;
  }

  .analysis-card {
    background: #fff;
    border-radius: var(--radius);
    padding: 24px;
    box-shadow: var(--shadow);
    margin-bottom: 16px;
  }
  .analysis-card h3 {
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .analysis-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    font-size: 13px;
    line-height: 1.6;
    margin-bottom: 10px;
    color: var(--text-secondary);
  }
  .analysis-item-icon {
    flex-shrink: 0;
    width: 22px; height: 22px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    margin-top: 1px;
  }
  .ai-card {
    background: linear-gradient(135deg, #f0f4ff 0%, #fef9ec 100%);
    border: 1px solid var(--gray-border);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 20px;
  }
  .ai-card-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
  }
  .ai-badge {
    background: linear-gradient(135deg, var(--blue) 0%, var(--blue-light) 100%);
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 99px;
    letter-spacing: 0.08em;
  }
  .ai-card-title { font-size: 15px; font-weight: 700; }
  .ai-text {
    font-size: 14px;
    line-height: 1.8;
    color: var(--text-primary);
    white-space: pre-wrap;
  }

  .restart-area {
    text-align: center;
    padding-top: 8px;
  }
  .restart-btn {
    background: none;
    border: none;
    color: var(--text-light);
    font-size: 13px;
    cursor: pointer;
    text-decoration: underline;
    padding: 8px;
  }
  .restart-btn:hover { color: var(--text-secondary); }

  /* ─── Animations ─── */
  @keyframes fadeSlideUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .animate-in { animation: fadeSlideUp 0.4s ease forwards; }

  @keyframes countUp {
    from { opacity: 0; transform: scale(0.8); }
    to { opacity: 1; transform: scale(1); }
  }
  .count-anim { animation: countUp 0.6s cubic-bezier(0.34,1.56,0.64,1) forwards; }
</style>
</head>
<body>

<header class="site-header">
  <div class="logo">MIERUBA<span>.</span></div>
  <div style="font-size:11px;color:rgba(255,255,255,0.5);letter-spacing:0.06em;">MIERUBA INDEX</div>
</header>

<div class="progress-wrap" id="progressWrap">
  <div class="progress-label">診断の進み具合</div>
  <div class="progress-bar-bg">
    <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
  </div>
  <div class="progress-steps" id="progressSteps"></div>
</div>

<div class="container">

  <!-- ─── Intro Screen ─── -->
  <div class="screen active" id="screen-intro">
    <div class="intro-hero animate-in">
      <div class="intro-badge">MIERUBA INDEX</div>
      <h1>共通認識力<br><span>自己診断</span></h1>
      <p>あなたの「認識を揃える力」を6つの軸で測定します</p>
      <div class="intro-score-preview">
        <span class="big">MI</span>
        <span class="small">score</span>
      </div>
    </div>

    <div class="intro-cards">
      <div class="intro-card animate-in" style="animation-delay:0.1s">
        <div class="intro-card-icon">👁</div>
        <div class="intro-card-title">6つの能力</div>
        <div class="intro-card-desc">見える力から共創力まで測定</div>
      </div>
      <div class="intro-card animate-in" style="animation-delay:0.15s">
        <div class="intro-card-icon">📊</div>
        <div class="intro-card-title">レーダーチャート</div>
        <div class="intro-card-desc">自分の強み・弱みを可視化</div>
      </div>
      <div class="intro-card animate-in" style="animation-delay:0.2s">
        <div class="intro-card-icon">🤖</div>
        <div class="intro-card-title">タイプ診断</div>
        <div class="intro-card-desc">5タイプで自分のスタイルを把握</div>
      </div>
    </div>

    <div class="intro-info animate-in" style="animation-delay:0.25s">
      <h3>診断について</h3>
      <ul>
        <li>全24問・約3〜5分で完了します</li>
        <li>5段階評価（1〜5）で直感的に回答してください</li>
        <li>現在のありのままの自分を評価してください</li>
        <li>結果はMIERUBAスコア・レーダーチャート・タイプで表示されます</li>
      </ul>
    </div>

    <button class="btn-primary animate-in" style="animation-delay:0.3s" onclick="startDiagnosis()">
      診断をはじめる →
    </button>
  </div>

  <!-- ─── Question Screens (generated) ─── -->
  <div id="questionScreens"></div>

  <!-- ─── Results Screen ─── -->
  <div class="screen" id="screen-results">
    <!-- filled by JS -->
  </div>

</div>

<script>
// ─────────────────────────────────────────
//  Data
// ─────────────────────────────────────────
const CATEGORIES = [
  {
    id: 'visibility',
    name: '見える力',
    nameEn: 'Visibility',

    color: '#3b82f6',
    bg: 'rgba(59,130,246,0.12)',

      '事実と解釈を分けて考えることができる',
      '問題の本質を見つけることができる',

      '状況を俯瞰して全体像を把握できる'

  },
  {
    id: 'perspective',

    description: '他人との違いを理解できるか',
    questions: [
      '異なる意見を歓迎することができる',
      '自分が正しいと思い込まないようにできる',
      '相手の立場を理解しようとする',

    ]
  },
  {
    id: 'alignment',
    name: '物差しを共有する力',
    nameEn: 'Alignment',
    icon: '⚖️',
    color: '#10b981',
    bg: 'rgba(16,185,129,0.12)',
    description: '判断基準を合わせられるか',
    questions: [
      '判断基準を相手に説明することができる',
      '優先順位をチームで共有できる',
      '何を大事にするかを話し合うことができる',
      '評価基準をすり合わせることができる'
    ]
  },
  {
    id: 'dialogue',
    name: '談議力',
    nameEn: 'Dialogue',
    icon: '💬',
    color: '#f59e0b',
    bg: 'rgba(245,158,11,0.12)',
    description: '対話で共通認識を形成できるか',
    questions: [
      '相手の話を最後まで聴くことができる',

// ─────────────────────────────────────────
//  State
// ─────────────────────────────────────────
let currentStep = 0; // 0 = intro, 1-6 = categories, 7 = results
let answers = {}; // { 'visibility_0': 3, ... }

// ─────────────────────────────────────────
//  Init
// ─────────────────────────────────────────
function buildQuestionScreens() {
  const wrap = document.getElementById('questionScreens');
  CATEGORIES.forEach((cat, ci) => {
    const screen = document.createElement('div');
    screen.className = 'screen';
    screen.id = `screen-cat-${ci}`;

    let questionsHtml = cat.questions.map((q, qi) => `
      <div class="q-card" id="qcard-${ci}-${qi}">
        <div class="q-text">${q}</div>
        <div class="scale-labels">
          <span>全くそう思わない</span>
          <span>強くそう思う</span>
        </div>
        <div class="scale-buttons">
          ${[1,2,3,4,5].map(v => `
            <button class="scale-btn"
              style="--active-color:${cat.color}"
              onclick="selectAnswer(${ci}, ${qi}, ${v}, this)"
              data-ci="${ci}" data-qi="${qi}" data-val="${v}">
              ${v}
            </button>
          `).join('')}
        </div>
      </div>
    `).join('');

    screen.innerHTML = `
      <div class="q-header">
        <div class="q-cat-icon" style="background:${cat.bg}; font-size:26px; display:flex; align-items:center; justify-content:center; width:52px; height:52px; border-radius:14px;">
          ${cat.icon}
        </div>
        <div class="q-cat-meta">
          <div class="q-cat-badge" style="color:${cat.color}">${ci+1}/6 · ${cat.nameEn}</div>
          <div class="q-cat-name">${cat.name}</div>
          <div class="q-cat-desc">${cat.description}</div>
        </div>
      </div>
      ${questionsHtml}
      <div class="btn-row">
        <button class="btn-secondary" onclick="goStep(${ci})">← 戻る</button>
        <button class="btn-primary" id="next-btn-${ci}" onclick="nextStep(${ci})" disabled>
          ${ci < CATEGORIES.length - 1 ? '次へ →' : '結果を見る →'}
        </button>
      </div>
    `;
    wrap.appendChild(screen);
  });

  // Progress steps
  const stepsEl = document.getElementById('progressSteps');
  CATEGORIES.forEach((cat, i) => {
    const el = document.createElement('div');
    el.className = 'progress-step';
    el.id = `pstep-${i}`;
    el.textContent = cat.name.length > 4 ? cat.name.slice(0,4) : cat.name;
    stepsEl.appendChild(el);
  });
}

// ─────────────────────────────────────────
//  Navigation
// ─────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function updateProgress(step) {
  const wrap = document.getElementById('progressWrap');
  if (step === 0 || step > CATEGORIES.length) {
    wrap.classList.remove('visible');
    return;
  }
  wrap.classList.add('visible');
  const pct = ((step - 1) / CATEGORIES.length) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.querySelectorAll('.progress-step').forEach((el, i) => {
    el.className = 'progress-step';
    if (i < step - 1) el.classList.add('done');
    else if (i === step - 1) el.classList.add('active');
  });
}

function startDiagnosis() {
  currentStep = 1;
  updateProgress(1);
  showScreen('screen-cat-0');
}

function goStep(fromCi) {
  if (fromCi === 0) {
    currentStep = 0;
    updateProgress(0);
    showScreen('screen-intro');
  } else {
    currentStep = fromCi;
    updateProgress(fromCi);
    showScreen(`screen-cat-${fromCi - 1}`);
  }
}

function nextStep(ci) {
  if (ci < CATEGORIES.length - 1) {
    currentStep = ci + 2;
    updateProgress(ci + 2);
    showScreen(`screen-cat-${ci + 1}`);
  } else {
    showResults();
  }
}

// ─────────────────────────────────────────
//  Answer handling
// ─────────────────────────────────────────
function selectAnswer(ci, qi, val, btn) {
  const key = `${ci}_${qi}`;
  answers[key] = val;

  // Update button styles in this question's group
  const btns = btn.parentElement.querySelectorAll('.scale-btn');
  btns.forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');

  // Check if all 4 questions in this category are answered
  checkCategoryComplete(ci);
}

function checkCategoryComplete(ci) {
  const allAnswered = CATEGORIES[ci].questions.every((_, qi) => {
    return answers[`${ci}_${qi}`] !== undefined;
  });
  const btn = document.getElementById(`next-btn-${ci}`);
  if (btn) btn.disabled = !allAnswered;
}

// ─────────────────────────────────────────
//  Score calculation
// ─────────────────────────────────────────
function calculateScores() {
  const scores = {};
  CATEGORIES.forEach((cat, ci) => {
    let total = 0;
    cat.questions.forEach((_, qi) => {
      total += (answers[`${ci}_${qi}`] || 1);
    });
    scores[cat.id] = parseFloat((total / cat.questions.length).toFixed(2));
  });
  return scores;
}

function getMIScore(scores) {
  const vals = Object.values(scores);
  return parseFloat((vals.reduce((a, b) => a + b, 0) / vals.length).toFixed(2));
}

function getStars(score) {
  const full = Math.floor(score);
  const half = score - full >= 0.5 ? 1 : 0;
  const empty = 5 - full - half;
  return '★'.repeat(full) + (half ? '☆' : '') + '✩'.repeat(empty);
}

function getRank(score) {
  if (score >= 4.5) return 'エキスパート';
  if (score >= 3.8) return 'アドバンスト';
  if (score >= 3.0) return 'インターミディエイト';
  if (score >= 2.0) return 'ビギナー';
  return 'スターター';
}

function determineType(scores) {
  for (const type of TYPES) {
    if (type.condition(scores)) return type;
  }
  return DEFAULT_TYPE;
}

function getTopCategories(scores, n = 2) {
  return Object.entries(scores)
    .sort((a, b) => b[1] - a[1])
    .slice(0, n)
    .map(([id]) => CATEGORIES.find(c => c.id === id));
}

function getBottomCategories(scores, n = 1) {
  return Object.entries(scores)
    .sort((a, b) => a[1] - b[1])
    .slice(0, n)
    .map(([id]) => CATEGORIES.find(c => c.id === id));
}

// ─────────────────────────────────────────
//  AI Analysis text
// ─────────────────────────────────────────
function generateAnalysis(type, scores, tops, bottoms) {
  const topNames = tops.map(c => c.name).join('・');
  const bottomName = bottoms[0].name;
  const mi = getMIScore(scores);

  const openers = [
    `あなたのMIスコアは${mi.toFixed(2)}点です。`,
    `診断結果から、あなたは${type.name}であることが分かりました。`,
    `6つの能力の分析から、あなたの認識合わせスタイルが見えてきました。`
  ];

  const body = `
【強み】
${topNames}が特に高く評価されています。これはMIERUBAが重視する「談議」の核心に近い能力です。チームの中で共通認識を形成する際に、あなたは自然とリーダー的な役割を担う傾向があります。

【改善ポイント】
${bottomName}は相対的に伸び代があります。この能力を高めることで、談議の質が一段階上がり、会議の生産性もさらに向上するでしょう。

【チームでの役割】
${type.role}

【次のステップ】
${type.advice}
  `.trim();

  return body;
}

// ─────────────────────────────────────────
//  Results rendering
// ─────────────────────────────────────────
let radarChart = null;

function showResults() {
  const scores = calculateScores();
  const mi = getMIScore(scores);
  const stars = getStars(mi);
  const rank = getRank(mi);
  const type = determineType(scores);
  const tops = getTopCategories(scores, 2);
  const bottoms = getBottomCategories(scores, 1);
  const analysis = generateAnalysis(type, scores, tops, bottoms);

  updateProgress(CATEGORIES.length + 1);
  document.getElementById('progressWrap').classList.remove('visible');

  const scoresGridHtml = CATEGORIES.map(cat => {
    const score = scores[cat.id];
    const pct = (score / 5) * 100;
    return `
      <div class="score-item">
        <div class="score-item-dot" style="background:${cat.color}"></div>
        <div class="score-item-inner">
          <div class="score-item-name">${cat.icon} ${cat.name}</div>
          <div class="score-item-val" style="color:${cat.color}">${score.toFixed(2)}</div>
          <div class="score-item-bar-bg">
            <div class="score-item-bar" style="background:${cat.color}; width:${pct}%"></div>
          </div>
        </div>
      </div>
    `;
  }).join('');

  const strengthsHtml = type.strengths.map(s => `
    <div class="analysis-item">
      <div class="analysis-item-icon" style="background:rgba(16,185,129,0.12); color:#10b981;">✓</div>
      <span>${s}</span>
    </div>
  `).join('');

  const weaknessesHtml = type.weaknesses.map(w => `
    <div class="analysis-item">
      <div class="analysis-item-icon" style="background:rgba(239,68,68,0.12); color:#ef4444;">△</div>
      <span>${w}</span>
    </div>
  `).join('');

  const tagsHtml = type.tags.map(t => `<span class="type-tag">${t}</span>`).join('');

  const resultHtml = `
    <div class="result-hero animate-in">
      <div class="result-title-label">MIERUBA INDEX 診断結果</div>
      <div class="result-mi-label">あなたのMIスコア</div>
      <div>
        <span class="result-score-big count-anim">${mi.toFixed(2)}</span>
        <span class="result-score-denom"> / 5.00</span>
      </div>
      <div class="result-stars">${stars}</div>
      <div class="result-rank">${rank}</div>
    </div>

    <div class="section-title">レーダーチャート</div>
    <div class="chart-card animate-in">
      <div class="chart-wrap">
        <canvas id="radarChart"></canvas>
      </div>
    </div>

    <div class="section-title">カテゴリー別スコア</div>
    <div class="scores-grid animate-in">
      ${scoresGridHtml}
    </div>

    <div class="section-title">あなたのタイプ</div>
    <div class="type-card animate-in">
      <div class="type-label">Your MIERUBA Type</div>
      <div class="type-name">${type.emoji} <span>${type.name}</span></div>
      <div class="type-desc">${type.desc}</div>
      <div class="type-tags">${tagsHtml}</div>
    </div>

    <div class="section-title">強み・改善ポイント</div>
    <div class="analysis-card animate-in">
      <h3>💪 あなたの強み</h3>
      ${strengthsHtml}
    </div>
    <div class="analysis-card animate-in">
      <h3>🌱 さらに伸ばせる点</h3>
      ${weaknessesHtml}
    </div>
    <div class="analysis-card animate-in">
      <h3>💡 アドバイス</h3>
      <div class="analysis-item">
        <div class="analysis-item-icon" style="background:rgba(43,74,203,0.1); color:#2b4acb;">→</div>
        <span>${type.advice}</span>
      </div>
    </div>

    <div class="section-title">AI分析レポート</div>
    <div class="ai-card animate-in">
      <div class="ai-card-header">
        <div class="ai-badge">MI ANALYSIS</div>
        <div class="ai-card-title">詳細分析</div>
      </div>
      <div class="ai-text">${analysis}</div>
    </div>

    <div class="restart-area">
      <button class="restart-btn" onclick="restartDiagnosis()">もう一度診断する</button>
    </div>
  `;

  const resultsScreen = document.getElementById('screen-results');
  resultsScreen.innerHTML = resultHtml;
  showScreen('screen-results');

  // Draw radar chart
  setTimeout(() => {
    drawRadar(scores);
  }, 100);
}

function drawRadar(scores) {
  const ctx = document.getElementById('radarChart');
  if (!ctx) return;

  if (radarChart) {
    radarChart.destroy();
    radarChart = null;
  }

  const labels = CATEGORIES.map(c => c.name);
  const data = CATEGORIES.map(c => scores[c.id]);
  const colors = CATEGORIES.map(c => c.color);

  radarChart = new Chart(ctx, {
    type: 'radar',
    data: {
      labels: labels,
      datasets: [{
        label: 'MI Score',
        data: data,
        backgroundColor: 'rgba(43,74,203,0.15)',
        borderColor: '#2b4acb',
        borderWidth: 2.5,
        pointBackgroundColor: colors,
        pointBorderColor: '#fff',
        pointBorderWidth: 2,
        pointRadius: 6,
        pointHoverRadius: 8
      }]
    },
    options: {
      responsive: true,
      scales: {
        r: {
          min: 0,
          max: 5,
          ticks: {
            stepSize: 1,
            display: false
          },
          grid: {
            color: 'rgba(0,0,0,0.08)'
          },
          angleLines: {
            color: 'rgba(0,0,0,0.08)'
          },
          pointLabels: {
            font: {
              size: 12,
              family: "'Hiragino Kaku Gothic ProN', sans-serif",
              weight: '700'
            },
            color: '#0f1740'
          }
        }
      },
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: (ctx) => `${ctx.label}: ${ctx.raw.toFixed(2)}点`
          }
        }
      },
      animation: {
        duration: 800,
        easing: 'easeInOutQuart'
      }
    }
  });
}

function restartDiagnosis() {
  answers = {};
  currentStep = 0;

  // Reset all button states
  document.querySelectorAll('.scale-btn').forEach(b => b.classList.remove('selected'));
  document.querySelectorAll('[id^="next-btn-"]').forEach(b => b.disabled = true);

  updateProgress(0);
  showScreen('screen-intro');
}

// ─────────────────────────────────────────
//  Boot
// ─────────────────────────────────────────
buildQuestionScreens();
